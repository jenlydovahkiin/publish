<style>

  .test{display:none}
  .progress{color:#666;margin-bottom:12px}
  .question{font-size:18px;font-weight:600;margin-bottom:20px;line-height:1.5}

    </div>

    </div>
    <div class="section">

      <p id="bad"></p>
    </div>
    <div class="section">

    </div>
    <div class="section">
      <h4>适合职业</h4>
      <p id="job"></p>
    </div>
    <div class="share">
      <button class="btn" onclick="alert('截图即可保存你的结果！')">截图保存结果</button>
      <button class="btn restart" onclick="location.reload()">重新测评</button>
    </div>
  </div>

let cur = 0;
let score = {e:0,i:0,s:0,n:0,t:0,f:0,j:0,p:0};
let sel = null;

function startTest(){
  document.getElementById("start").style.display = "none";
  document.getElementById("test").style.display = "block";
  show();
}

function show(){
  const q = questions[cur];
  document.getElementById("progress").innerText = `第 ${cur+1} / 60 题`;
  document.getElementById("qtext").innerText = q.q;
  const box = document.getElementById("opts");
  box.innerHTML = `
  <div class="opt" onclick="c(0)">非常不符合</div>
  <div class="opt" onclick="c(1)">不太符合</div>
  <div class="opt" onclick="c(2)">中立</div>
  <div class="opt" onclick="c(3)">比较符合</div>
  <div class="opt" onclick="c(4)">非常符合</div>`;
  sel = null;
}

function c(v){
  sel = v;
  document.querySelectorAll(".opt").forEach((o,i)=>o.classList.toggle("active",i===v));
}

function next(){
  if(sel === null) return alert("请选择一项");
  const q = questions[cur];
  const w = sel / 4;
  score.e += q.e * w;
  score.i += q.i * w;
  score.s += q.s * w;
  score.n += q.n * w;
  score.t += q.t * w;
  score.f += q.f * w;
  score.j += q.j * w;
  score.p += q.p * w;
  cur++;
  if(cur >= questions.length) return finish();
  show();
}

function finish(){
  document.getElementById("test").style.display = "none";
  document.getElementById("result").style.display = "block";
  const ei = score.e > score.i ? "E" : "I";
  const sn = score.s > score.n ? "S" : "N";
  const tf = score.t > score.f ? "T" : "F";
  const jp = score.j > score.p ? "J" : "P";
  const key = ei + sn + tf + jp;
  const t = types[key] || types.INFP;
  document.getElementById("type").innerText = key + " · " + t.name;
  document.getElementById("desc").innerText = t.desc;
  document.getElementById("good").innerText = t.good;
  document.getElementById("bad").innerText = t.bad;
  document.getElementById("love").innerText = t.love;
  document.getElementById("job").innerText = t.job;
}
